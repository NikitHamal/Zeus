name: Build Zeus Release APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/build-release.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-cleanup: on-success

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --build-cache
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g" -Dorg.gradle.parallel=true -Dorg.gradle.caching=true
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.GITHUB_OAUTH_CLIENT_SECRET }}

      - name: Get version and commit info
        id: info
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*versionName\s*=\s*"\(.*\)"/\1/')
          HASH=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Rename APK with commit hash
        run: |
          mkdir -p dist
          for apk in app/build/outputs/apk/release/*.apk; do
            cp "$apk" "dist/Zeus-v${{ steps.info.outputs.version }}-${{ steps.info.outputs.hash }}.apk"
          done

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeus-v${{ steps.info.outputs.version }}-${{ steps.info.outputs.hash }}
          path: dist/Zeus-v${{ steps.info.outputs.version }}-${{ steps.info.outputs.hash }}.apk
          retention-days: 30