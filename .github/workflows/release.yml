name: Build and release Zeus

on:
  workflow_dispatch:
  push:
    branches: ['**']
    paths-ignore:
      - "**/*.md"

permissions:
  contents: write

concurrency:
  group: zeus-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Validate OAuth configuration
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        run: |
          if [ -z "$OAUTH_CLIENT_ID" ]; then
            echo "::error::Repository secret OAUTH_CLIENT_ID is required."
            exit 1
          fi

      - name: Build signed release APK
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        run: |
          gradle --no-daemon --stacktrace :app:assembleRelease -POAUTH_CLIENT_ID="$OAUTH_CLIENT_ID"

      - name: Name APK after commit
        id: package
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          APK_NAME="Zeus-${SHORT_SHA}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          sha256sum "$APK_NAME" > "$APK_NAME.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Zeus-${{ steps.package.outputs.short_sha }}
          path: |
            ${{ steps.package.outputs.apk_name }}
            ${{ steps.package.outputs.apk_name }}.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          APK_NAME: ${{ steps.package.outputs.apk_name }}
          SHORT_SHA: ${{ steps.package.outputs.short_sha }}
        run: |
          TAG="build-${SHORT_SHA}-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" \
            "$APK_NAME" \
            "$APK_NAME.sha256" \
            --target "$GITHUB_SHA" \
            --title "Zeus ${SHORT_SHA}" \
            --notes "Automated signed Android release for commit ${GITHUB_SHA}. The included signing key is public and intended only for personal/open-source test builds."
